[workspace]
name = "dotfiles"
version = "0.1.0"
description = "Hand-rolled symlink dotfile manager"
authors = ["Jack Myers <jackhmyers97@gmail.com>"]
channels = ["conda-forge"]
platforms = ["linux-64", "win-64"]

[tasks]
sync   = { cmd = "nu --no-config-file -c 'use scripts/dots.nu; dots sync'",   description = "Create symlinks for all dots.toml entries on the current platform" }
unlink = { cmd = "nu --no-config-file -c 'use scripts/dots.nu; dots unlink'", description = "Remove all managed symlinks (leaves .bak files untouched)" }
status = { cmd = "nu --no-config-file -c 'use scripts/dots.nu; dots status'", description = "Show link state for all entries: linked | missing | conflict | wrong-target" }

[tasks.add]
cmd = "nu --no-config-file -c 'use scripts/dots.nu; dots add {{ real_path }}{% if platforms %} --platforms {{ platforms }}{% endif %}'"
args = ["real_path", { arg = "platforms", default = "" }]
description = "Copy a real path into the repo, register in dots.toml, and symlink back. Usage: add <real-path> [platforms]"

[tasks.link]
cmd = "nu --no-config-file -c 'use scripts/dots.nu; dots link {{ repo_source }} {{ real_path }}{% if platforms %} --platforms {{ platforms }}{% endif %}'"
args = ["repo_source", "real_path", { arg = "platforms", default = "" }]
description = "Register an existing repo source with a new target path and symlink. Usage: link <repo-source> <real-path> [platforms]"

[tasks.remove]
cmd = "nu --no-config-file -c 'use scripts/dots.nu; dots remove {{ target }}'"
args = ["target"]
description = "Remove an entry from dots by target path: unlinks the symlink and moves the repo source back to the system location"

[tasks.purge]
cmd = "nu --no-config-file -c 'use scripts/dots.nu; dots purge {{ target }}'"
args = ["target"]
description = "Purge an entry from dots by target path: unlinks the symlink and deletes the repo source entirely"

[target.linux-64.tasks]
install = { cmd = "nu --no-config-file scripts/install.nu", description = "Bootstrap: sync dotfiles, install global tools, set up nushell and opencode" }

[target.win-64.tasks]
install = { cmd = "nu --no-config-file scripts/install.nu", description = "Bootstrap: sync dotfiles, install global tools, set up nushell and opencode" }
